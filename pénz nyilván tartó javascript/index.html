<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pénzügyi Tracker – Átlátható Összegzés</title>
<style>
:root{
  --bg:#0f172a;
  --panel:#111827;
  --text:#e5e7eb;
  --sub:#9ca3af;
  --accent:#f59e0b;
  --danger:#ef4444;
  --ok:#10b981;
  --info:#60a5fa;
  --radius:16px;
  --shadow:0 10px 30px rgba(0,0,0,.35);
}
html,body{margin:0; height:100%; font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif; background:linear-gradient(180deg,#0b1023 0%,#0f172a 100%); color:var(--text);}
.container{max-width:1100px;margin:0 auto;padding:24px;}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.title{font-size:clamp(26px,5vw,36px); font-weight:800;}
.muted{color:var(--sub);}
.badge{background:rgba(245,158,11,.15);color:#fde68a;padding:4px 10px;border-radius:999px;border:1px solid rgba(245,158,11,.4);}
.panel{background:var(--panel); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px;}
.grid{display:grid; gap:16px;}
.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr));}
@media (max-width:900px){.grid.cols-4{grid-template-columns:1fr;}}
.stat{padding:20px; border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; font-weight:700; font-size:1.2rem; box-shadow:var(--shadow);}
.stat .label{font-size:0.9rem;color:var(--sub); margin-bottom:8px;}
.stat .value{font-size:clamp(20px,3vw,28px);}
.stat.income{background:linear-gradient(180deg, rgba(16,185,129,.15), rgba(16,185,129,.05)); color:#10b981; border:1px solid rgba(16,185,129,.4);}
.stat.expense{background:linear-gradient(180deg, rgba(239,68,68,.15), rgba(239,68,68,.05)); color:#ef4444; border:1px solid rgba(239,68,68,.4);}
.stat.subscription{background:linear-gradient(180deg, rgba(96,165,250,.15), rgba(96,165,250,.05)); color:#3b82f6; border:1px solid rgba(96,165,250,.4);}
.stat.balance{background:linear-gradient(180deg, rgba(245,158,11,.15), rgba(245,158,11,.05)); color:#f59e0b; border:1px solid rgba(245,158,11,.4);}
.controls{display:flex; flex-wrap:wrap; gap:16px; margin-bottom:24px; align-items:center;}
.controls label{font-size:12px; color:var(--sub);}
input, select, button{padding:10px 12px; border-radius:12px; border:1px solid rgba(255,255,255,.08); background:var(--panel); color:var(--text); outline:none; transition: .2s;}
input:focus, select:focus{border-color:var(--accent);}
button{cursor:pointer;}
.btn.primary{background:var(--accent); color:#111827; font-weight:600;}
.btn.ghost{background:transparent; color:var(--text);}
.btn.danger{background:var(--danger); color:#fff;}
table{width:100%; border-collapse:separate; border-spacing:0 10px;}
thead th{color:var(--sub); font-size:12px; text-align:left; padding:0 10px;}
tbody td{padding:12px 10px; background:var(--panel); border-top:1px solid rgba(255,255,255,.08); border-bottom:1px solid rgba(255,255,255,.08);}
tbody tr td:first-child{border-top-left-radius:12px; border-bottom-left-radius:12px;}
tbody tr td:last-child{border-top-right-radius:12px; border-bottom-right-radius:12px;}
.pill{padding:4px 8px; border-radius:999px; font-size:11px; font-weight:700; letter-spacing:.3px;}
.pill.income{background:rgba(16,185,129,.15); color:#10b981;}
.pill.expense{background:rgba(239,68,68,.15); color:#ef4444;}
.pill.subscription{background:rgba(96,165,250,.15); color:#3b82f6;}
.actions{display:flex; gap:8px;}
.empty{text-align:center; color:var(--sub); padding:20px;}
</style>
</head>
<body>
<div class="container">
<header>
<div>
<div class="title">Pénzügyi Tracker</div>
<div class="muted">Kiadások, bevételek és előfizetések nyilvántartása.</div>
</div>
<span class="badge">Offline • Egy fájl</span>
</header>

<section class="controls">
<div>
<label for="month">Hónap</label><br>
<input type="month" id="month">
</div>
<div>
<label for="currency">Pénznem</label><br>
<select id="currency">
<option value="HUF">HUF</option>
<option value="EUR">EUR</option>
<option value="USD">USD</option>
<option value="GBP">GBP</option>
</select>
</div>
<div>
<button class="btn ghost" id="btnExportCsv">Export CSV</button>
<button class="btn ghost" id="btnExportJson">Export JSON</button>
<button class="btn danger" id="btnClear">Összes törlése</button>
</div>
</section>

<section class="panel">
<h3>Összegzés (<span id="summaryMonth"></span>)</h3>
<div class="grid cols-4" style="margin-top:16px;">
<div class="stat income"><div class="label">Bevétel</div><div class="value" id="sumIncome">–</div></div>
<div class="stat expense"><div class="label">Kiadás</div><div class="value" id="sumExpense">–</div></div>
<div class="stat subscription"><div class="label">Előfizetés</div><div class="value" id="sumSubscription">–</div></div>
<div class="stat balance"><div class="label">Egyenleg</div><div class="value" id="sumBalance">–</div></div>
</div>
</section>

<section class="panel" style="margin-top:24px;">
<h3>Új tétel</h3>
<form id="entryForm" autocomplete="off" style="margin-top:12px; display:grid; gap:12px;">
<div>
<label for="date">Dátum</label><br>
<input type="date" id="date" required>
</div>
<div>
<label for="type">Típus</label><br>
<select id="type">
<option value="expense">Kiadás</option>
<option value="income">Bevétel</option>
<option value="subscription">Előfizetés</option>
</select>
</div>
<div>
<label for="desc">Leírás</label><br>
<input type="text" id="desc" placeholder="pl. Kávé, Fizetés, Netflix" required>
</div>
<div>
<label for="category">Kategória</label><br>
<input type="text" id="category" list="categoryList" placeholder="pl. Étkezés, Lakbér">
<datalist id="categoryList"></datalist>
</div>
<div>
<label for="amount">Összeg</label><br>
<input type="text" id="amount" inputmode="decimal" placeholder="pl. 2990" required>
</div>
<div style="display:flex; gap:8px;">
<button class="btn primary" type="submit">Hozzáadás</button>
<button class="btn ghost" type="reset">Reset</button>
</div>
</form>
</section>

<section class="panel" style="margin-top:24px;">
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
<h3>Tételek</h3>
<input type="text" id="search" placeholder="Keresés (leírás, kategória)">
</div>
<div style="overflow:auto;">
<table>
<thead><tr><th>Dátum</th><th>Leírás</th><th>Kategória</th><th>Típus</th><th>Összeg</th><th></th></tr></thead>
<tbody id="rows"></tbody>
</table>
</div>
<div id="empty" class="empty" style="display:none;">Nincs tétel a kiválasztott hónaphoz.</div>
</section>

<footer style="margin-top:24px; text-align:center; color:var(--sub); font-size:12px;">Adatok helyben tárolva • Pénzügyi Tracker – vanilla JS</footer>
</div>

<script src="script.js"></script>
</body>
</html>
